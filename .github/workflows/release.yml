name: Release

# Builds installers for macOS (.dmg/.app), Linux (.deb/.rpm/.AppImage) and
# Windows (.exe/.msi) and attaches them to a GitHub Release.
#
# Trigger it by pushing a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# or run it manually from the Actions tab (workflow_dispatch).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Universal binary covers both Apple Silicon and Intel Macs.
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          # Build Linux on the oldest supported runner for the widest glibc range.
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            build-essential \
            file

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build the app and publish the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Anvil ${{ github.ref_name }}"
          releaseBody: "Download the installer for your platform below."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
